{% extends 'base.html' %}
{% block title %}Login | LandlordPro{% endblock %}
{% block content %}
<div class="auth-box card">
  <h1>Welcome back</h1>
  <form class="form" method="post">
    <label>Email<input name="email" type="email" required placeholder="Enter your email"></label>
    <label>Password<input name="password" type="password" required placeholder="Enter your password"></label>
    <button class="btn btn-primary" type="submit">Login</button>
  </form>
  <p class="text-muted">No account? <a href="{{ url_for('auth.register') }}">Register</a> · <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p>
</div>
{% endblock %}
